<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Deep space background -->
  <circle cx="32" cy="32" r="30" fill="#0f172a"/>
  <!-- Indigo ring -->
  <circle cx="32" cy="32" r="30" stroke="#6366f1" stroke-width="2" fill="none"/>
  <!-- Orbital scanning arcs -->
  <path d="M 14 32 A 18 18 0 0 1 50 32" stroke="#818cf8" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M 50 32 A 18 18 0 0 1 14 32" stroke="#818cf8" stroke-width="1.2" fill="none" opacity="0.25"/>
  <!-- Eye shape -->
  <path d="M 10 32 Q 32 16 54 32 Q 32 48 10 32 Z" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="8" fill="#4f46e5"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="4" fill="#06b6d4"/>
  <!-- Star / compass point in the pupil -->
  <polygon points="32,26 33.5,30.5 38,32 33.5,33.5 32,38 30.5,33.5 26,32 30.5,30.5" fill="#cffafe" opacity="0.9"/>
  <!-- Light reflection -->
  <circle cx="28" cy="29" r="1.8" fill="white" opacity="0.35"/>
</svg>
